name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install CI dependencies
        run: |
          python -m pip install --upgrade pip
          # Install non-GPU dependencies only (skip torch, diffusers, audiocraft, etc.)
          pip install \
            anthropic \
            apscheduler \
            sqlalchemy \
            pyyaml \
            python-dotenv \
            requests \
            transformers \
            sentencepiece \
            protobuf \
            huggingface-hub \
            ftfy \
            safetensors \
            soundfile \
            "numpy>=1.26.0" \
            opencv-python-headless \
            Pillow \
            imagehash \
            pysubs2 \
            scipy \
            google-api-python-client \
            google-auth-httplib2 \
            google-auth-oauthlib \
            rich \
            psutil \
            flask \
            flask-socketio
          # Dev/test tools
          pip install ruff pytest

      - name: Lint with ruff
        run: ruff check .

      - name: Run tests (skip GPU-dependent)
        run: pytest -m "not gpu" -v
