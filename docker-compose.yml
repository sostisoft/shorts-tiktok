services:
  videobot:
    build: .
    container_name: videobot-finanzas
    restart: unless-stopped
    env_file: .env
    environment:
      - HSA_OVERRIDE_GFX_VERSION=11.0.0
      - PYTORCH_ROCM_ARCH=gfx1100
      - HSA_ENABLE_SDMA=0
      - GPU_MAX_ALLOC_PERCENT=100
      - GPU_SINGLE_ALLOC_PERCENT=100
      - GPU_MAX_HEAP_SIZE=100
      - PYTORCH_HIP_ALLOC_CONF=backend:native,expandable_segments:True,garbage_collection_threshold:0.9
      - AMD_LOG_LEVEL=0
      - MIOPEN_FIND_MODE=FAST
      - TORCH_ROCM_AOTRITON_ENABLE_EXPERIMENTAL=1
      - PYTHONUNBUFFERED=1
      - TZ=Europe/Madrid
      - OMP_NUM_THREADS=16
      - MKL_NUM_THREADS=16
      - OLLAMA_HOST=http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add:
      - "44"
      - "993"
    volumes:
      - ./credentials:/app/credentials
      - ./models:/app/models
      - ./output:/app/output
      - ./logs:/app/logs
      - ./db:/app/db
      - ./assets:/app/assets
      - hf_cache:/root/.cache/huggingface
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # Job manual: genera un vídeo al instante sin esperar al scheduler
  generate-now:
    build: .
    container_name: videobot-generate
    profiles: [manual]
    env_file: .env
    environment:
      - HSA_OVERRIDE_GFX_VERSION=11.0.0
      - PYTORCH_ROCM_ARCH=gfx1100
      - HSA_ENABLE_SDMA=0
      - GPU_MAX_ALLOC_PERCENT=100
      - GPU_SINGLE_ALLOC_PERCENT=100
      - GPU_MAX_HEAP_SIZE=100
      - PYTORCH_HIP_ALLOC_CONF=backend:native,expandable_segments:True,garbage_collection_threshold:0.9
      - AMD_LOG_LEVEL=0
      - MIOPEN_FIND_MODE=FAST
      - TORCH_ROCM_AOTRITON_ENABLE_EXPERIMENTAL=1
      - PYTHONUNBUFFERED=1
      - TZ=Europe/Madrid
      - OMP_NUM_THREADS=16
      - MKL_NUM_THREADS=16
      - OLLAMA_HOST=http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    entrypoint: ["python3", "-c", "from scheduler.runner import run_job; run_job()"]
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add:
      - "44"
      - "993"
    volumes:
      - ./credentials:/app/credentials
      - ./models:/app/models
      - ./output:/app/output
      - ./logs:/app/logs
      - ./db:/app/db
      - ./assets:/app/assets
      - hf_cache:/root/.cache/huggingface

  # Web UI para gestionar el bot
  webui:
    build: ./webui
    container_name: videobot-webui
    restart: unless-stopped
    ports:
      - "5050:5000"
    environment:
      - DB_PATH=/app/db/videobot.db
      - LOG_PATH=/app/logs/videobot.log
      - OUTPUT_PATH=/app/output
      - COMPOSE_DIR=/app/shorts
      - TZ=Europe/Madrid
    volumes:
      - ./db:/app/db
      - ./logs:/app/logs
      - ./output:/app/output
      - /var/run/docker.sock:/var/run/docker.sock
      - /home/gmktec/shorts:/app/shorts
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Descarga de modelos (ejecutar una vez)
  download-models:
    build: .
    container_name: videobot-download
    profiles: [setup]
    env_file: .env
    entrypoint: ["python3", "scripts/download_models.py"]
    volumes:
      - ./models:/app/models
      - hf_cache:/root/.cache/huggingface
    deploy:
      resources:
        limits:
          memory: 16g

volumes:
  hf_cache:
    name: videobot-hf-cache
