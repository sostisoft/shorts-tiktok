version: "3.8"

services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports:
      - "8087:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://shortforge:shortforge@db:5432/shortforge
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT: http://minio:9000
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://shortforge:shortforge@db:5432/shortforge
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT: http://minio:9000
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: shortforge
      POSTGRES_PASSWORD: shortforge
      POSTGRES_DB: shortforge
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5438:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shortforge"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6382:6379"
    restart: unless-stopped

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9002:9000"
      - "9003:9001"
    volumes:
      - miniodata:/data
    restart: unless-stopped

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    ports:
      - "3050:3000"
    environment:
      API_BASE_URL: http://api:8000
      SESSION_SECRET: ${SESSION_SECRET:-change-me-to-a-random-32-character-string!!}
      ADMIN_API_KEY_HASH: ${ADMIN_API_KEY_HASH:-}
    depends_on:
      - api
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "8090:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - dashboard
    restart: unless-stopped

volumes:
  pgdata:
  miniodata:
